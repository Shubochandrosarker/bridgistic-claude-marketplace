name: Release

# Publishes everything in one run:
#   1. GitHub release (tag created automatically if needed) with all
#      user-facing assets: bridgistic.mcpb, claude package, WordPress plugin zip
#   2. npm publish of bridgistic-mcp-server  — needs the NPM_TOKEN secret;
#      skipped with a notice when it is not configured
#   3. MCP Registry publish (registry.modelcontextprotocol.io) via GitHub
#      OIDC — no secret needed; runs only after a successful npm publish
#      (the registry validates the npm package exists and carries the
#      mcp-name marker)
#
# Two ways to trigger:
#   - push a tag:  git tag v1.1.0 && git push origin v1.1.0
#   - Actions → Release → "Run workflow" with the version (e.g. 1.1.0);
#     the tag is created on the selected ref by the release step

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.1.0) — must match the manifests"
        required: true

permissions:
  contents: write # create the GitHub release + tag
  id-token: write # GitHub OIDC login for the MCP Registry

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a valid semver version"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check manifests match the version
        run: |
          V="${{ steps.ver.outputs.version }}"
          for f in package.json mcp-server/package.json plugins/bridgistic/.claude-plugin/plugin.json mcpb/manifest.json server.json; do
            HAVE=$(node -p "require('./$f').version")
            if [ "$HAVE" != "$V" ]; then
              echo "::error::$f is at $HAVE but the release version is $V"; exit 1
            fi
          done
          echo "All manifests at $V"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Validate
        run: npm run validate

      - name: Build packages + desktop extension
        run: |
          npm run package
          npm run desktop:package

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          ASSETS="dist/bridgistic.mcpb dist/bridgistic-claude-package.zip dist/bridgistic-wordpress-plugin.zip"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — replacing assets"
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "Bridgistic $TAG" \
              --generate-notes \
              $ASSETS
          fi

      - name: Publish to npm
        id: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN secret not set — skipping npm + MCP Registry publish. Add it in repo Settings → Secrets to enable."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            # cd, not --prefix: npm publish ignores --prefix and would try to
            # publish the (private) repo root instead of the server package.
            (cd mcp-server && npm publish --access public)
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to the MCP Registry
        if: steps.npm.outputs.published == 'true'
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
          echo "Published io.github.shubochandrosarker/bridgistic to registry.modelcontextprotocol.io"
